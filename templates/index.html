<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blueprint Inventory App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Inter, Arial, sans-serif;
      background: #f5f7fa;
      color: #16202a;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(720px, 100%);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }
    h1 { margin-top: 0; }
    .error {
      color: #b91c1c;
      background: #fef2f2;
      border: 1px solid #fecaca;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Blueprint Inventory App</h1>
    <div class="error">{{ error }}</div>
  </div>
</body>
</html>
